services:
  web:
    build: .
    volumes:
      - .:/app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://bookly:booklypass123@db:5432/bookly_db}
      JWT_SECRET: ${JWT_SECRET:-default-dev-secret-change-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      MAIL_USERNAME: ${MAIL_USERNAME:-demo@ethereal.email}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-demo-password}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.ethereal.email}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_FROM: ${MAIL_FROM:-demo@ethereal.email}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Bookly}
      DOMAIN: ${DOMAIN:-localhost:8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

    # Wait for DB to be healthy, run migrations, then start the server
    command: >
      sh -c "alembic upgrade head &&
             fastapi run src --port 8000 --host 0.0.0.0"

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

    networks:
      - app-network

    restart: on-failure

  db:
    image: postgres:15

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookly}
      POSTGRES_DB: ${POSTGRES_DB:-bookly_db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booklypass123}

    ports:
     - "5432:5432"

    volumes:
      - db-data:/var/lib/postgresql/data

    networks:
      - app-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookly} -d ${POSTGRES_DB:-bookly_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6

    ports:
     - "6379:6379"

    networks:
     - app-network

  celery:
    build: .

    command: celery -A src.celery_tasks.c_app worker --loglevel=INFO

    volumes:
      - .:/app

    depends_on:
      - redis

    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://bookly:booklypass123@db:5432/bookly_db}
      JWT_SECRET: ${JWT_SECRET:-default-dev-secret-change-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      MAIL_USERNAME: ${MAIL_USERNAME:-demo@ethereal.email}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-demo-password}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.ethereal.email}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_FROM: ${MAIL_FROM:-demo@ethereal.email}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Bookly}
      DOMAIN: ${DOMAIN:-localhost:8000}

    networks:
      - app-network

    restart: on-failure

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
